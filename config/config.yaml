# -------------  PARSE  ----------------

parse:
  get_refs:
    fa_link: "https://ftp.ensembl.org/pub/release-113/fasta/homo_sapiens/dna/Homo_sapiens.GRCh38.dna.primary_assembly.fa.gz"
    gtf_link: "https://ftp.ensembl.org/pub/release-113/gtf/homo_sapiens/Homo_sapiens.GRCh38.113.gtf.gz"
    fa_out: ../resources/refs/Homo_sapiens.GRCh38.dna.primary_assembly.fa.gz
    gtf_out: ../resources/refs/Homo_sapiens.GRCh38.113.gtf.gz
    outdir: ../resources/refs/
    log: ../results/00LOG/01PARSE/get_refs.log
  mk_ref:
    outfile: ../resources/refs/ref.done
    outdir: ../resources/refs/hg38
    build: hg38
    log: ../results/00LOG/01PARSE/mk_ref.log
  cat_fqs:
    out_r1: ../results/01PARSE/MRGD_fqs/{sample}_R1.fastq.gz 
    out_r2: ../results/01PARSE/MRGD_fqs/{sample}_R2.fastq.gz
    log_r1: ../results/00LOG/01PARSE/cat_fqs_{sample}_R1.log
    log_r2: ../results/00LOG/01PARSE/cat_fqs_{sample}_R1.log
    outdir: ../results/01PARSE/MRGD_fqs/
  run_parse:
    outfile: ../results/01PARSE/{sample}/run.done
    log: ../results/00LOG/01PARSE/run_parse_{sample}.log


