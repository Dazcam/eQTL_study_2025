    prefix_in: ../results/05TENSORQTL/prep_input/chrALL_final.filt
    log: ../results/00LOG/05TENSORQTL/tensorqtl_{cell_type}_{norm_method}_genPC_{geno_pc}_expPC_{exp_pc}_trans.log

  get_perm_ld_proxies:
    output: ../results/05TENSORQTL/proxies/{cell_type}/tensorqtl_perm_proxies.tsv    
    proxy_dir: ../results/05TENSORQTL/proxies/{cell_type}/    
