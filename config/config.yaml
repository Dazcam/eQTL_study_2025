# ------------  GENOTYPES PRE_IMPUTATION  ----------------

geno_pre_impute:
  convert_raw:
    input:
      ped: ../resources/genotypes/PLINK_040325_1121_Bray_hg19/Bray_hg19.ped
      map: ../resources/genotypes/PLINK_040325_1121_Bray_hg19/Bray_hg19.map
    output: ../results/03GENOTYPES-PRE/GenotypeQCtoHRC/eqtl_genotypes_hg19.bed
    prefix_in: ../resources/genotypes/PLINK_040325_1121_Bray_hg19/Bray_hg19
    prefix_out: ../results/03GENOTYPES-PRE/GenotypeQCtoHRC/eqtl_genotypes_hg19
    log: ../results/00LOG/03GENOTYPES-PRE/convert_raw.log

  add_sex_to_fam:
    sexfile: ../resources/sheets/samples_sex_plink.tsv
    output: ../results/03GENOTYPES-PRE/GenotypeQCtoHRC/eqtl_genotypes_hg19_sex.bed
    prefix_out: ../results/03GENOTYPES-PRE/GenotypeQCtoHRC/eqtl_genotypes_hg19_sex
    log: ../results/00LOG/03GENOTYPES-PRE/add_sex_to_fam.log 
   
  rm_dup_sample:
    output: ../results/03GENOTYPES-PRE/GenotypeQCtoHRC/eqtl_genotypes_hg19_nodup.bed
    prefix_out: ../results/03GENOTYPES-PRE/GenotypeQCtoHRC/eqtl_genotypes_hg19_nodup
    remove_file: ../config/rm_dup_sample.txt
    log: ../results/00LOG/03GENOTYPES-PRE/rm_dup_sample.log

  check_het:
    output: ../results/03GENOTYPES-PRE/GenotypeQCtoHRC/eqtl_genotypes_hg19_nodup.het
    log: ../results/00LOG/03GENOTYPES-PRE/check_het.log

  make_kgp3_pgen:
    input: ../results/03GENOTYPES-PRE/GenotypeQCtoHRC/dragondata_extra/ancestry_reference/1kgp/kgp3.array_snps.id
    output: ../results/03GENOTYPES-PRE/GenotypeQCtoHRC/dragondata_extra/ancestry_reference/1kgp/kgp3.array_snps.pgen
    log: ../results/00LOG/03GENOTYPES-PRE/GenotypeQCtoHRC/make_kgp3_pgen.log
    workdir: ../results/03GENOTYPES-PRE/GenotypeQCtoHRC/dragondata_extra/ancestry_reference/1kgp/

  genotype-qc2hrc:
    output: ../results/03GENOTYPES-PRE/GenotypeQCtoHRC/eqtlgenotypeshg38pretm.qc_report.html
    prefix_in: eqtl_genotypes_hg19_nodup
    prefix_out: eqtl_genotypes_hg38_preTM
    shortname: eqtlhg38tm
    outdir: ../results/03GENOTYPES-PRE/GenotypeQCtoHRC/eqtlgenotypeshg38pretm/
    workdir: ../results/03GENOTYPES-PRE/GenotypeQCtoHRC
    report_dir: reports/03GENOTYPES-PRE/
    log: ../results/00LOG/03GENOTYPES-PRE/genotype-qc2hrc.log

  cat_genotypes:
    output: ../results/03GENOTYPES-PRE/genotypes/eqtl_genotypes_hg38.gh.topmed.allchr.vcf.gz
    in_dir: ../results/03GENOTYPES-PRE/GenotypeQCtoHRC/eqtlgenotypeshg38pretm/imputeMe/

  rm_maf_ambig:
    output: ../results/03GENOTYPES-PRE/genotypes/eqtl_genotypes_hg38.gh.topmed.allchr.rm_ambig.bed
    prefix_in: ../results/03GENOTYPES-PRE/genotypes/eqtl_genotypes_hg38.gh.topmed.allchr.
    prefix_out: ../results/03GENOTYPES-PRE/genotypes/eqtl_genotypes_hg38.gh.topmed.allchr.rm_ambig
    ambig_snp_lst: reports/03GENOTYPES-PRE/ambig_high_maf_snp_lst.tsv
    log: ../results/00LOG/03GENOTYPES-PRE/rm_maf_ambig.log

  rm_rare_snps:
    output: ../results/03GENOTYPES-PRE/genotypes/eqtl_genotypes_hg38.gh.topmed.allchr.rm_ambig.rm_rare_snps.bed
    prefix_out: ../results/03GENOTYPES-PRE/genotypes/eqtl_genotypes_hg38.gh.topmed.allchr.rm_ambig.rm_rare_snps 
    log: ../results/00LOG/03GENOTYPES-PRE/rm_rare_snps.log

  split_chrs:
    output: ../results/03GENOTYPES-PRE/genotypes_for_TOPMED/genotypes.done 
    prefix_vcf: ../results/03GENOTYPES-PRE/genotypes/eqtl_genotypes_hg38.gh.topmed.allchr.filt
    outdir: ../results/03GENOTYPES-PRE/genotypes_for_TOPMED/
    log: ../results/00LOG/03GENOTYPES-PRE/split_chrs.log

  gather_stats:
    output: ../results/03GENOTYPES-PRE/genotypes_for_TOPMED/gather_stats.done
    gQC2hrc_vcf_dir: ../results/03GENOTYPES-PRE/GenotypeQCtoHRC/eqtlgenotypeshg38pretm/imputeMe/  
    final_vcf_dir: ../results/03GENOTYPES-PRE/genotypes_for_TOPMED/    
    log: ../results/00LOG/03GENOTYPES-PRE/gather_stats.log     

  geno_pre_report:
    rmd_script: scripts/genotyping_pre_impute_report.Rmd
    html: reports/03GENOTYPES-PRE/03genotyping_pre_impute_report.html
    out_file: ../reports/03GENOTYPES-PRE/03genotyping_pre_impute_report.html
    in_dir: ../reports/03GENOTYPES-PRE/
    bmark_dir: ../reports/benchmarks/
    log: ../results/00LOG/03GENOTYPES-PRE/geno_pre_report.log


# ------------  GENOTYPES POST-IMPUTATION  ----------------
    
geno_post_impute:
  impute_check:
    input:  ../results/04GENOTYPES-POST/TOPMED/chr_{chr}.zip
    tsv: reports/04GENOTYPES-POST/impute_check/chr_{chr}_summary.tsv
    vcf: ../results/04GENOTYPES-POST/TOPMED/chr{chr}.dose.vcf.gz
    in_dir: ../results/04GENOTYPES-POST/TOPMED/
    pwd: ../config/passwords/topmed.txt 
    log: ../results/00LOG/04GENOTYPES-POST/impute_check_{chr}.log
  impute_check_cat:
    output: ../results/04GENOTYPES-POST/impute_check/chr_ALL_summary.tsv
  dwnld_dbsnp_ref:
    output: ../resources/refs/dbSNP/dbsnp_hg38_build156.vcf.gz
    web_link: https://ftp.ncbi.nih.gov/snp/redesign/latest_release/VCF/GCF_000001405.40.gz
    prefix: ../resources/refs/dbSNP/dbsnp_hg38_build156.vcf.gz 
    log: ../results/00LOG/04GENOTYPES-POST/dwnld_dbsnp_ref.log
  add_rsID:
    output: ../results/04GENOTYPES-POST/dbSNP_annotated/chr{chr}.dbSNP.vcf.gz
    log: ../results/00LOG/04GENOTYPES-POST/add_rsID_{chr}.log     
  vcf_cat:
    output: ../results/04GENOTYPES-POST/dbSNP_annotated/chrALL.dbSNP.vcf.gz
    log: ../results/00LOG/04GENOTYPES-POST/vcf_cat.log    
  filter_tags:
    output: ../results/04GENOTYPES-POST/filtered/chrALL.filt.vcf.gz
    hwe: 0.0001
    maf: 0.05
    rsq: 0.8  
    log: ../results/00LOG/04GENOTYPES-POST/filter_tags.log    
  check_VCF:  
    ref_gz: ../resources/refs/Homo_sapiens.GRCh38.dna.primary_assembly.fa.gz
    log_out: ../results/04GENOTYPES-POST/filtered/check_vcf.check.log
    list: ../results/04GENOTYPES-POST/filtered/exclusion_list.txt
    ref: ../resources/refs/Homo_sapiens.GRCh38.dna.primary_assembly.fa
    fai: ../resources/refs/Homo_sapiens.GRCh38.dna.primary_assembly.fa.fai
    prefix_out: ../results/04GENOTYPES-POST/filtered/check_vcf
    log: ../results/00LOG/04GENOTYPES-POST/check_VCF.log
  exclude_SNPs:
    output: ../results/04GENOTYPES-POST/filtered/chrALL_final.filt.vcf.gz
    log: ../results/00LOG/04GENOTYPES-POST/exclde_SNPs.log
  idx_vcf:
    output: ../results/04GENOTYPES-POST/filtered/chrALL_final.filt.vcf.gz.tbi
    log: ../results/00LOG/04GENOTYPES-POST/idx_vcf.log
  create_combined_log:
    output: ../results/04GENOTYPES-POST/filtered/combined_genotype_processing.log
    log: ../results/00LOG/04GENOTYPES-POST/create_combined_log 
  get_sample_list:
    output: ../results/04GENOTYPES-POST/filtered/geno_sample_list.txt
  vcf_to_plink:
    output: ../results/04GENOTYPES-POST/filtered/chrALL_final.filt.bed
    params: ../results/04GENOTYPES-POST/filtered/chrALL_final.filt
    log: ../results/00LOG/04GENOTYPES-POST/vcf_to_plink.log
  get_ld_pruned_snps:
    output: ../results/04GENOTYPES-POST/covariates/ld_prune.prune.in
    params: ../results/04GENOTYPES-POST/covariates/ld_prune
    log: ../results/00LOG/04GENOTYPES-POST/get_ld_pruned_snps.log
  prune_genotypes:
    output: ../results/04GENOTYPES-POST/covariates/chrALL_final.filt.ld_pruned.bed
    params: ../results/04GENOTYPES-POST/covariates/chrALL_final.filt.ld_pruned
    log: ../results/00LOG/04GENOTYPES-POST/prune_genotypes.log
  calc_genotype_pcs:
    output: ../results/04GENOTYPES-POST/covariates/pca.eigenvec
    params: ../results/04GENOTYPES-POST/covariates/pca
    pcs: 10
    log: ../results/00LOG/04GENOTYPES-POST/calc_genotype_pcs.log

# ------------  TENSORQTL  ----------------

tensorQTL:
  tool: tensorqtl
  num_chunks: 100
  perm_min: 1000
  perm_max: 10000
  plink_prefix: ../results/04GENOTYPES/TOPMED/filtered/chrALL_final.filt
  out_prefix: ../results/04TENSORQTL/chrALL_final.filt
  window: 500000
  geno_pcs: 4
#  exp_pcs: [40]
  norm_methods: ["quantile"]
  exp_pcs: [10,20,30,40,50]
#  norm_methods: ["bryois", "fujita", "quantile", "xue"]

  prep_tensorQTL_input:
    cov_file: ../results/04GENOTYPES-POST/covariates/pca.eigenvec
    sex_file: reports/02SCANPY/02_metadata_per_sample.tsv
    gene_lookup: ../resources/sheets/gene_lookup_hg38.tsv
    exp_out: ../results/05TENSORQTL/prep_input/{cell_type}_{norm_method}.bed
    cov_out: ../results/05TENSORQTL/prep_input/{cell_type}_{norm_method}_base_covariates.txt
    pseudoblk_dir: ../results/02SCANPY/pseudobulk/
    out_dir: ../results/05TENSORQTL/prep_input/
    report_dir: reports/05TENSORQTL/
    batch_var: "PCW"  # For ComBat; set to your batch column (e.g., "PCW", "sample")
    log: ../results/00LOG/05TENSORQTL/prep_tensorQTL_input_{cell_type}_{norm_method}.log

  zip_pblk_cnts:
    output: ../results/05TENSORQTL/prep_input/{cell_type}_{norm_method}.bed.gz
    log: ../results/00LOG/05TENSORQTL/zip_pblk_cnts_{cell_type}_{norm_method}.log

  convert_genotypes:
    input: ../results/04GENOTYPES-POST/filtered/chrALL_final.filt.vcf.gz
    output: ../results/05TENSORQTL/prep_input/chrALL_final.filt.pgen
    prefix_out: ../results/05TENSORQTL/prep_input/chrALL_final.filt
    log: ../results/00LOG/05TENSORQTL/convert_genotypes.log

  split_covariates:
    output: ../results/05TENSORQTL/prep_input/{cell_type}_{norm_method}_genPC_{geno_pc}_expPC_{exp_pc}_split_covariates.txt
    log: ../results/00LOG/05TENSORQTL/split_covariates_{cell_type}_{norm_method}_genPC_{geno_pc}_expPC_{exp_pc}.log

  tensorqtl_nom:
    output: ../results/05TENSORQTL/tensorqtl_nom/{cell_type}_{norm_method}_genPC_{geno_pc}_expPC_{exp_pc}/{cell_type}_{norm_method}_nom.cis_qtl_pairs.4.parquet
    prefix_out: ../results/05TENSORQTL/tensorqtl_nom/{cell_type}_{norm_method}_genPC_{geno_pc}_expPC_{exp_pc}/{cell_type}_{norm_method}_nom
    prefix_in: ../results/05TENSORQTL/prep_input/chrALL_final.filt
    log: ../results/00LOG/05TENSORQTL/tensorqtl_{cell_type}_{norm_method}_genPC_{geno_pc}_expPC_{exp_pc}_nom.log

  tensorqtl_perm:
    output: ../results/05TENSORQTL/tensorqtl_perm/{cell_type}_{norm_method}_genPC_{geno_pc}_expPC_{exp_pc}/{cell_type}_{norm_method}_perm.cis_qtl.txt.gz
    prefix_out: ../results/05TENSORQTL/tensorqtl_perm/{cell_type}_{norm_method}_genPC_{geno_pc}_expPC_{exp_pc}/{cell_type}_{norm_method}_perm
    prefix_in: ../results/05TENSORQTL/prep_input/chrALL_final.filt
    log: ../results/00LOG/05TENSORQTL/tensorqtl_{cell_type}_{norm_method}_genPC_{geno_pc}_expPC_{exp_pc}_perm.log

  tensorqtl_independent:
    output: ../results/05TENSORQTL/tensorqtl_independent/{cell_type}_{norm_method}_genPC_{geno_pc}_expPC_{exp_pc}/{cell_type}_{norm_method}_independent.cis_independent_qtl.txt.gz
    prefix_out: ../results/05TENSORQTL/tensorqtl_independent/{cell_type}_{norm_method}_genPC_{geno_pc}_expPC_{exp_pc}/{cell_type}_{norm_method}_independent
    prefix_in: ../results/05TENSORQTL/prep_input/chrALL_final.filt
    log: ../results/00LOG/05TENSORQTL/tensorqtl_{cell_type}_{norm_method}_genPC_{geno_pc}_expPC_{exp_pc}_independent.log   

  tensorqtl_trans:
    output: ../results/05TENSORQTL/tensorqtl_trans/{cell_type}_{norm_method}_genPC_{geno_pc}_expPC_{exp_pc}/{cell_type}_{norm_method}.trans_qtl_pairs.txt.gz
