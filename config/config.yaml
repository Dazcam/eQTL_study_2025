# ------------  GLOBAL  ----------------

MERGE_FQ_JSON: ../config/samples_plate3.json
plate:
  - plate1
  - plate2
  - plate3

root_dir: /scratch/c.c1477909/eQTL_study_2025/

cell_types: 
#  - "ExN-1"
  - "ExN-2"
  - "InN"
  - "OPC"
  - "RG"
  - "Endo-Peri"
  - "MG"

eqtl_fdr: 0.05

susie_window: 1000000
susie_batches: 25
write_full_susie: TRUE

gwas:
  scz: https://figshare.com/ndownloader/files/34517828  # EUR only

containers:
  fastqtl: ../resources/containers/gtex_eqtl.sif
  tensorqtl: ../resources/containers/tensorqtl.sif
  genotype-qc2hrc: ../resources/containers/genotype-qc2hrc_latest.sif
  R: ../resources/containers/seurat5f.sif
  susie: ../resources/containers/susier_v24.01.1.sif
  ubuntu: ../resources/containers/ubuntu_22.04.sif
  twas: ../resources/containers/twas.sif


# -------------  PARSE  ----------------

parse:
  get_refs:
    fa_link: "https://ftp.ensembl.org/pub/release-113/fasta/homo_sapiens/dna/Homo_sapiens.GRCh38.dna.primary_assembly.fa.gz"
    gtf_link: "https://ftp.ensembl.org/pub/release-113/gtf/homo_sapiens/Homo_sapiens.GRCh38.113.gtf.gz"
    fa_out: ../resources/refs/Homo_sapiens.GRCh38.dna.primary_assembly.fa.gz
    gtf_out: ../resources/refs/Homo_sapiens.GRCh38.113.gtf.gz
    outdir: ../resources/refs/
    log: ../results/00LOG/01PARSE/get_refs.log
  mk_ref:
    outfile: ../resources/refs/ref.done
    outdir: ../resources/refs/hg38
    build: hg38
    log: ../results/00LOG/01PARSE/mk_ref.log
  cat_fqs:
    out_r1: ../results/01PARSE/MRGD_fqs/{sample}_R1.fastq.gz 
    out_r2: ../results/01PARSE/MRGD_fqs/{sample}_R2.fastq.gz
    log_r1: ../results/00LOG/01PARSE/cat_fqs_{sample}_R1.log
    log_r2: ../results/00LOG/01PARSE/cat_fqs_{sample}_R1.log
    outdir: ../results/01PARSE/MRGD_fqs/
  run_parse:
    outfile: ../results/01PARSE/{sample}/run.done
    log: ../results/00LOG/01PARSE/run_parse_{sample}.log


# ------------  SCANPY  ----------------

scanpy:
  qc:
    input: 
      plate: ../results/01PARSE/combine_{plate}/all-sample/DGE_filtered/anndata.h5ad
      nb: scripts/scanpy_qc.ipynb  
    output: ../results/02SCANPY/scanpy_qc_{plate}.html
    nb_out: ../results/02SCANPY/scanpy_qc_{plate}_pm.ipynb
    html_out: scanpy_qc_{plate}.html
    benchmark: scanpy_qc.{plate}.benchmark.txt 
    log: ../results/00LOG/01SCANPY/scanpy_qc_{plate}.log

  clustering:
    input: scripts/scanpy_clustering.ipynb
    output: ../results/02SCANPY/scanpy_clustering.html 
    nb_out: ../results/02SCANPY/scanpy_clustering_pm.ipynb
    html_out: scanpy_clustering.html
    benchmark: scanpy_clustering.benchmark.txt
    log: ../results/00LOG/02SCANPY/scanpy_clustering.log

  annotation:
    input: scripts/scanpy_annotation.ipynb
    output: ../results/02SCANPY/scanpy_annotation.html
    nb_out: ../results/02SCANPY/scanpy_annotation_pm.ipynb
    html_out: scanpy_annotation.html
    log: ../results/00LOG/02SCANPY/scanpy_annotation.log

  pseudobulk:
    input: scripts/scanpy_cell_label_and_pseudobulk.ipynb
    output: ../results/02SCANPY/scanpy_cell_label_and_pseudobulk.html
    nb_out: ../results/02SCANPY/scanpy_cell_label_and_pseudobulk_pm.ipynb
    html_out: scanpy_cell_label_and_pseudobulk.html
    log: ../results/00LOG/02SCANPY/scanpy_cell_label_and_pseudobulk.log

  extra:
    input: scripts/scanpy_extra.ipynb
    output: ../results/02SCANPY/scanpy_extra.html
    nb_out: ../results/02SCANPY/scanpy_extra_pm.ipynb
    html_out: scanpy_extra.html
    log: ../results/00LOG/02SCANPY/scanpy_extra.log

  env: "../envs/eqtl_study.yml"

# ------------  eQTL  ----------------

eQTL:
  tool: tensorqtl
  num_chunks: 100
  perm_min: 1000
  perm_max: 10000
  plink_prefix: ../results/04GENOTYPES/TOPMED/filtered/chrALL_final.filt
  out_prefix: ../results/04TENSORQTL/chrALL_final.filt
  window: 500000
input_files:
  counts: ../results/03SCANPY/pseudobulk/{cell_type}_tmm.bed
  genotypes: ../results/04GENOTYPES/TOPMED/filtered/chrALL_final.filt.vcf.gz
  covariates: ../results/03SCANPY/pseudobulk/{cell_type}_covariates.txt
output_files:
  counts_gz: ../results/03SCANPY/pseudobulk/{cell_type}_tmm.bed.gz
  genotypes_plink: ../results/04TENSORQTL/chrALL_final.filt.pgen 
  fastqtl_output: ../results/04FASTQTL/{cell_type}_nom_{chunk}_txt.gz
  fastqtl_perm_output: ../results/04FASTQTL/{cell_type}_perm_{chunk}_txt.gz
  tensorqtl_out_prefix: ../results/04TENSORQTL/{cell_type}/{cell_type}_nom
  tensorqtl_output: ../results/04TENSORQTL/{cell_type}/{cell_type}_nom.cis_qtl_pairs.4.parquet
  tensorqtl_perm_out_prefix: ../results/04TENSORQTL/{cell_type}/{cell_type}_perm
  tensorqtl_perm_output: ../results/04TENSORQTL/{cell_type}/{cell_type}_perm.cis_qtl.txt.gz
  tensorqtl_perm_log: ../results/04TENSORQTL/{cell_type}/{cell_type}_perm.tensorQTL.cis.log
  tensorqtl_tss_plt: ../results/figs/tss_density_plot_combined.png
  tensorqtl_tss_tbl: ../results/tables/tensorqtl_summary_table.tsv

log_files:
  fastqtl_zip: ../results/00LOG/04FASTQTL/{cell_type}_bgzip.log
  fastqtl: ../results/00LOG/04FASTQTL/{cell_type}_nom_{chunk}.log
  fastqtl_perm: ../results/00LOG/04FASTQTL/{cell_type}_perm_{chunk}.log
  tensorqtl: ../results/00LOG/04TENSORQTL/{cell_type}_nom.log
  tensorqtl_perm: ../results/00LOG/04TENSORQTL/{cell_type}_perm.log
  tensorqtl_tss: ../results/00LOG/04TENSORQTL/tss.log   

# ------------  SLDSR  ----------------

slsdr:
  get_sig_eGenes:
    output: ../results/05SLDSR/susie_input/{cell_type}_eGenes_fdr_0.05.tsv
    log: ../results/00LOG/05SLDSR/get_sig_eGenes_{cell_type}.log

  prep_susie_gene_meta:
    output: ../results/05SLDSR/susie_input/{cell_type}_gene_meta.tsv
    log: ../results/00LOG/05SLDSR/prep_susie_gene_meta_{cell_type}.log

  vcf_to_dosage:
    out_dosage: ../results/05SLDSR/susie_input/chrALL_final.filt.dose.tsv.gz
    out_idx: ../results/05SLDSR/susie_input/chrALL_final.filt.dose.tsv.gz.tbi
    log: ../results/00LOG/05SLDSR/vcf_to_dosage.log   

  prep_susie_input:
    out_exp: ../results/05SLDSR/susie_input/{cell_type}_tmm_susie_ready.bed
    out_covar: ../results/05SLDSR/susie_input/{cell_type}_covariates_susie_ready.txt
    out_samp_lst: ../results/05SLDSR/susie_input/{cell_type}_samp_lst_susie_ready.txt
    log: ../results/00LOG/05SLDSR/prep_susie_input_{cell_type}.log

  run_susie:
    cs_hp_out: ../results/05SLDSR/susie/{cell_type}/{cell_type}.{batch_index}_{susie_batches}.susie.cred.hp.txt
    cs_out: ../results/05SLDSR/susie/{cell_type}/{cell_type}.{batch_index}_{susie_batches}.susie.cred.txt
    snp_out: ../results/05SLDSR/susie/{cell_type}/{cell_type}.{batch_index}_{susie_batches}.susie.snp.txt
    log: ../results/00LOG/05SLDSR/run_susie_{cell_type}_{batch_index}_{susie_batches}.log

  merge_susie:
    output: ../results/05SLDSR/susie/{cell_type}/{cell_type}.mrgd.susie.{susie_suffix}.gz
    log: ../results/00LOG/05SLDSR/merge_susie_{cell_type}_{susie_suffix}.log

  sort_susie:
    output: ../results/05SLDSR/susie/{cell_type}/{cell_type}.mrgd.srtd.susie.cred.hp.txt.gz
    log: ../results/00LOG/05SLDSR/sort_susie_{cell_type}.log
  
  get_hg38_refs:
    baseline: ../resources/ldsr/ldsr_hg38_refs/baseline_v1.2/baseline.{chr}.l2.ldscore.gz
    weights: ../resources/ldsr/ldsr_hg38_refs/weights/weights.hm3_noMHC.{chr}.l2.ldscore.gz
    frq: ../resources/ldsr/ldsr_hg38_refs/plink_files/1000G.EUR.hg38.{chr}.frq  
    bim: ../resources/ldsr/ldsr_hg38_refs/plink_files/1000G.EUR.hg38.{chr}.bim
#    snps: ../resources/ldsr_hg38_refs/hm3_no_MHC.list.txt  # Can't have this in same rule as out files with {chr}
    params: ../resources/ldsr/ldsr_hg38_refs/
    log: ../results/00LOG/05SLDSR/get_hg38_refs.{chr}.log

  get_hg19_refs:
    # Note that we're not tracking the SNPs file in snakemake, but it is needed, may need seprate rule
    baseline: ../resources/ldsr/ldsr_hg19_refs/baseline_v1.2/baseline.{chr}.l2.ldscore.gz 
    weights: ../resources/ldsr/ldsr_hg19_refs/weights/weights.hm3_noMHC.{chr}.l2.ldscore.gz
    frq: ../resources/ldsr/ldsr_hg19_refs/plink_files/1000G.EUR.QC.{chr}.frq
    bim: ../resources/ldsr/ldsr_hg19_refs/plink_files/1000G.EUR.QC.{chr}.bim
    params: ../resources/ldsr_hg19_refs/
    log: ../results/00LOG/05SLDSR/get_hg19_refs.{chr}.log

  make_annot_maxCPP:
    output: ../results/05SLDSR/sldsr/annot/{cell_type}/{cell_type}.{chr}.annot.gz
    log: ../results/00LOG/05SLDSR/make_annot_maxCPP_{cell_type}.{chr}.log 

  lift_hapmap3_snps:
    output: ../results/05SLDSR/sldsr/liftover/hm3_hg38_no_MHC.list.txt
    log: ../results/00LOG/05SLDSR/lift_hapmap3_snps.log

  ldsr_ld_scores_hg38:
    output: ../results/05SLDSR/sldsr/annot/{cell_type}/{cell_type}.{chr}.l2.ldscore.gz
    bfile: ../resources/ldsr/ldsr_hg38_refs/plink_files/1000G.EUR.hg38.{chr}
    ldscores: ../results/05SLDSR/sldsr/annot/{cell_type}/{cell_type}.{chr}
    log: ../results/00LOG/05SLDSR/ldsr_ld_scores_hg38_{cell_type}_{chr}.log

  ldsr_strat_hg38_bl_v12:
    output:  ../results/05SLDSR/sldsr/strat_bl_v12/{cell_type}/{cell_type}_hg38_bl.v1.2_{gwas}.results
    out_prefix: ../results/05SLDSR/sldsr/strat_bl_v12/{cell_type}/{cell_type}_hg38_bl.v1.2_{gwas}
    weights: ../resources/ldsr/ldsr_hg38_refs/weights/weights.hm3_noMHC.
    baseline: ../resources/ldsr/ldsr_hg38_refs/baseline_v1.2/baseline.
    frq: ../resources/ldsr/ldsr_hg38_refs/plink_files/1000G.EUR.hg38.
    ldscores: ../results/05SLDSR/sldsr/annot/{cell_type}/{cell_type}.
    log: ../results/00LOG/05SLDSR/strat_hg38_bl_v12_{cell_type}_{gwas}.log 

  ldsr_strat_summary:
    output:  ../results/05SLDSR/sldsr/strat_bl_v12/ldsr_strat_hg38_bl_v12.summary.tsv
    log: ../results/00LOG/05SLDSR/ldsr_strat_hg38_bl_v12_summary.log

  get_gwas_sumstats:
    output: ../results/05SLDSR/gwas/{gwas}_hg19_raw.tsv
    log: ../results/00LOG/05SLDSR/get_gwas_sumstats_{gwas}.log

  standardise_sumstats:
    output: ../results/05SLDSR/gwas/{gwas}_hg19_standardised.tsv
    temp: ../results/05SLDSR/gwas/{gwas}_hg19_raw_temp.tsv
    log: ../results/00LOG/05SLDSR/standardise_sumstats_{gwas}.log    

  add_z_score:
    output: ../results/05SLDSR/gwas/{gwas}_hg19_with_Z.tsv
    log: ../results/00LOG/05SLDSR/add_z_score_{gwas}.log

  add_N:
    output: ../results/05SLDSR/gwas/{gwas}_hg19_with_N.tsv
    log: ../results/00LOG/05SLDSR/add_N_{gwas}.log

  make_gwas_bed_hg19:
    output: ../results/05SLDSR/gwas/{gwas}_hg19.bed
    log: ../results/00LOG/05SLDSR/create_gwas_bed_hg19_{gwas}.log    

  liftover_gwas_to_hg38:
    output: ../results/05SLDSR/gwas/{gwas}_hg38.bed
    chain: ../resources/liftover/hg19ToHg38.over.chain.gz
    unlifted: ../results/05SLDSR/gwas/{gwas}_hg19_unlifted.bed
    log: ../results/00LOG/05SLDSR/liftover_gwas_to_hg38_{gwas}.log

  add_hg38_coords_to_gwas:
    output: ../results/05SLDSR/gwas/{gwas}_hg38.tsv
    log: ../results/00LOG/05SLDSR/add_hg38_coords_to_gwas_{gwas}.log

  munge_sumstats:
    output: ../results/05SLDSR/gwas/{gwas}_hg38_ldsr_ready.sumstats.gz
    prefix: ../results/05SLDSR/gwas/{gwas}_hg38_ldsr_ready
    log: ../results/00LOG/05SLDSR/munge_sumstats_{gwas}.log

plot_qtl:
  run: True  
  pairs_file: ../results/04TENSORQTL/plots/snp_gene_pairs.csv
  out_dir: ../results/04TENSORQTL/plots
  out_file: ../results/04TENSORQTL/plots/plot_qtl.done
  expression_dir: ../results/03SCANPY/pseudobulk
  log: ../results/00LOG/04TENSORQTL/plot_qtl.log 

# ------------  GENOTYPES PRE_IMPUTATION  ----------------

geno_pre_impute:
  convert_raw:
    input:
      ped: ../resources/genotypes/PLINK_040325_1121_Bray_hg19/Bray_hg19.ped 
      map: ../resources/genotypes/PLINK_040325_1121_Bray_hg19/Bray_hg19.map
    output: ../results/04GENOTYPES/GenotypeQCtoHRC/eqtl_genotypes_hg19.bed
    in_prefix: ../resources/genotypes/PLINK_040325_1121_Bray_hg19/Bray_hg19
    out_prefix: ../results/04GENOTYPES/GenotypeQCtoHRC/eqtl_genotypes_hg19
    log: ../results/00LOG/04GENOTYPES/GenotypeQCtoHRC/convert_raw.log
  
  make_kgp3_pgen:
    input: ../results/04GENOTYPES/GenotypeQCtoHRC/dragondata_extra/ancestry_reference/1kgp/kgp3.array_snps.id
    output: ../results/04GENOTYPES/GenotypeQCtoHRC/dragondata_extra/ancestry_reference/1kgp/kgp3.array_snps.pgen  
    log: ../results/00LOG/04GENOTYPES/GenotypeQCtoHRC/make_kgp3_pgen.log
    workdir: ../results/04GENOTYPES/GenotypeQCtoHRC/dragondata_extra/ancestry_reference/1kgp/    

  genotype-qc2hrc:
    output: ../results/04GENOTYPES/GenotypeQCtoHRC/eqtlgenotypeshg38pretm.qc_report.html
    in_prefix: eqtl_genotypes_hg19
    out_prefix: eqtl_genotypes_hg38_preTM
    shortname: eqtlhg38tm
    log: ../results/00LOG/04GENOTYPES/GenotypeQCtoHRC/genotype-qc2hrc.log
    
# ------------  GENOTYPES POST-IMPUTATION  ----------------
    
genotypes:
  impute_check:
    input:  ../results/04GENOTYPES/TOPMED/chr_{chr}.zip
    output: 
      tsv: ../results/04GENOTYPES/TOPMED/impute_check/chr_{chr}_summary.tsv
      vcf: ../results/04GENOTYPES/TOPMED/chr{chr}.dose.vcf.gz
    params: 
      dir: ../results/04GENOTYPES/TOPMED/
      pwd: ../config/passwords/topmed.txt 
    log: ../results/00LOG/04GENOTYPES/TOPMED/impute_check_{chr}.log
  impute_check_cat:
    output: ../results/04GENOTYPES/TOPMED/impute_check/chr_ALL_summary.tsv
  dwnld_dbsnp_ref:
    output: ../resources/refs/dbSNP/dbsnp_hg38_build156.vcf.gz.tbi 
    params:
      web_link: https://ftp.ncbi.nih.gov/snp/redesign/latest_release/VCF/GCF_000001405.40.gz
      prefix: ../resources/refs/dbSNP/dbsnp_hg38_build156.vcf.gz 
    log: ../results/00LOG/04GENOTYPES/TOPMED/dwnld_dbsnp_ref.log
  add_rsID:
    output: ../results/04GENOTYPES/TOPMED/dbSNP_annotated/chr{chr}.dbSNP.vcf.gz
    log: ../results/00LOG/04GENOTYPES/TOPMED/add_rsID_{chr}.log     
  vcf_cat:
    output: ../results/04GENOTYPES/TOPMED/dbSNP_annotated/chrALL.dbSNP.vcf.gz
    log: ../results/00LOG/04GENOTYPES/TOPMED/vcf_cat.log    
  filter_tags:
    output: ../results/04GENOTYPES/TOPMED/filtered/chrALL.filt.vcf.gz
    params:
      hwe: 0.0001
      maf: 0.05
      rsq: 0.8  
    log: ../results/00LOG/04GENOTYPES/TOPMED/filter_tags.log    
  check_VCF:  
    input:
      ref_gz: ../resources/refs/Homo_sapiens.GRCh38.dna.primary_assembly.fa.gz
    output: 
      log: ../results/04GENOTYPES/TOPMED/filtered/check_vcf.check.log
      list: ../results/04GENOTYPES/TOPMED/filtered/exclusion_list.txt
      ref: ../resources/refs/Homo_sapiens.GRCh38.dna.primary_assembly.fa
      fai: ../resources/refs/Homo_sapiens.GRCh38.dna.primary_assembly.fa.fai
    params: ../results/04GENOTYPES/TOPMED/filtered/check_vcf
    log: ../results/00LOG/04GENOTYPES/TOPMED/check_VCF.log
  exclude_SNPs:
    output: ../results/04GENOTYPES/TOPMED/filtered/chrALL_final.filt.vcf.gz
    log: ../results/00LOG/04GENOTYPES/TOPMED/exclde_SNPs.log
  idx_vcf:
    output: ../results/04GENOTYPES/TOPMED/filtered/chrALL_final.filt.vcf.gz.tbi
    log: ../results/00LOG/04GENOTYPES/TOPMED/idx_vcf.log
  create_combined_log:
    output: ../results/04GENOTYPES/TOPMED/filtered/combined_genotype_processing.log
    log: ../results/00LOG/04GENOTYPES/TOPMED/create_combined_log.log 
  get_sample_list:
    output: ../results/04GENOTYPES/TOPMED/filtered/geno_sample_list.txt
  vcf_to_plink:
    output: ../results/04GENOTYPES/TOPMED/filtered/chrALL_final.filt.bed
    params: ../results/04GENOTYPES/TOPMED/filtered/chrALL_final.filt
    log: ../results/00LOG/04GENOTYPES/TOPMED/vcf_to_plink.log
  get_ld_pruned_snps:
    output: ../results/04GENOTYPES/TOPMED/covariates/ld_prune.prune.in
    params: ../results/04GENOTYPES/TOPMED/covariates/ld_prune
    log: ../results/00LOG/04GENOTYPES/TOPMED/get_ld_pruned_snps.log
  prune_genotypes:
    output: ../results/04GENOTYPES/TOPMED/covariates/chrALL_final.filt.ld_pruned.bed
    params: ../results/04GENOTYPES/TOPMED/covariates/chrALL_final.filt.ld_pruned
    log: ../results/00LOG/04GENOTYPES/TOPMED/prune_genotypes.log
  calc_genotype_pcs:
    output: ../results/04GENOTYPES/TOPMED/covariates/pca.eigenvec
    params: ../results/04GENOTYPES/TOPMED/covariates/pca
    pcs: 10
    log: ../results/00LOG/04GENOTYPES/TOPMED/calc_genotype_pcs.log

# ---------  TWAS  ----------

twas:
  get_gemma:
    output: ../resources/gemma/gemma
  prep_exp_data:
    input: ../results/03SCANPY/pseudobulk/{cell_type}_tmm.bed
    exp: ../results/06TWAS/fusion_input/{cell_type}_tmm_plink.txt
    coord: ../results/06TWAS/fusion_input/{cell_type}_gene_coord.txt
    log: ../results/00LOG/06TWAS/prep_exp_data_{cell_type}.log
  convert_vcf:
    input: ../results/04GENOTYPES/TOPMED/filtered/chrALL_final.filt.vcf.gz
    bed: ../results/06TWAS/fusion_input/genotypes_hg38.bed
    bim: ../results/06TWAS/fusion_input/genotypes_hg38.bim
    fam: ../results/06TWAS/fusion_input/genotypes_hg38.fam 
    prefix: ../results/06TWAS/fusion_input/genotypes_hg38
    log: ../results/00LOG/06TWAS/convert_vcf.log
  restrict_geno_to_ldref:
    bed: ../results/06TWAS/fusion_input/genotypes_hg38_filt.bed 
    bim: ../results/06TWAS/fusion_input/genotypes_hg38_filt.bim
    fam: ../results/06TWAS/fusion_input/genotypes_hg38_filt.fam
    snp_lst: ../results/06TWAS/fusion_input/ldref_snps.txt
    prefix_in: ../results/06TWAS/fusion_input/genotypes_hg38
    prefix_out: ../results/06TWAS/fusion_input/genotypes_hg38_filt
    log: ../results/00LOG/06TWAS/restrict_geno_to_ldref.log
  compute_weights:
    covar: ../results/03SCANPY/pseudobulk/{cell_type}_covariates.txt
    output: ../results/06TWAS/weights/{cell_type}/{gene_id}.wgt.RDat
    outdir: ../results/06TWAS/weights/{cell_type}
    log: ../results/00LOG/06TWAS/weights_{cell_type}_{gene_id}.log
  aggregate_weights:
    output: ../results/06TWAS/weights/{cell_type}/summary.txt
    log: ../results/00LOG/06TWAS/aggregate_{cell_type}.log

# ---------  SMR  ----------

smr:
  get_smr_binary:
    smr: ../resources/smr/smr
    prefix: ../resources/smr
  get_snp_positions:
    snp_pos: ../results/07SMR/smr_input/snp_positions.txt
    log: ../results/00LOG/07SMR/get_snp_positions.log
  cat_tensorqtl_nom_snps:
    cat_snps: ../results/04TENSORQTL/{cell_type}/{cell_type}_nom.cis_qtl_pairs.tsv    
    summary: ../results/04TENSORQTL/{cell_type}/{cell_type}_nom.cis_qtl_pairs_snp_summary.tsv
    dir: ../results/04TENSORQTL/{cell_type}
    log: ../results/00LOG/07SMR/cat_tensorqtl_nom_snps_{cell_type}.log
  create_query:
    r_script: scripts/prep_eQTL_for_smr.R
    query: ../results/07SMR/smr_input/{cell_type}/{cell_type}_query.tsv
    gene_lst: ../results/07SMR/smr_input/{cell_type}/{cell_type}_gene_list.tsv
    log: ../results/00LOG/07SMR/create_query_{cell_type}.log
  create_besd:
    besd: ../results/07SMR/smr_input/{cell_type}/{cell_type}.besd
    prefix: ../results/07SMR/smr_input/{cell_type}/{cell_type}
    log: ../results/00LOG/07SMR/create_besd_{cell_type}.log
  cat_refs:
    frq_in: ../resources/ldsr/ldsr_hg38_refs/plink_files/1000G.EUR.hg38.{chr}.frq
    bed_in: ../resources/ldsr/ldsr_hg38_refs/plink_files/1000G.EUR.hg38.{chr}.bed
