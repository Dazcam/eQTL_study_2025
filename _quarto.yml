project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "!workflow/scripts/*.Rmd"

website:
  title: "Single-Cell eQTL Pipeline"
  sidebar:
    style: "floating"
    search: true
    contents:
      - section: "Getting Started"
        contents:
          - index.qmd
          - setup.qmd
      - section: "Pipelines"
        contents: 
          - pipelines/01-parse.qmd
          - pipelines/02-scanpy.qmd
          - pipelines/03-geno-pre.qmd
          - pipelines/04-geno-post.qmd
          - pipelines/05-tensorqtl.qmd
          - pipelines/06-qtl-replication.qmd
          - pipelines/07-prep-GWAS.qmd
          - pipelines/08-susie.qmd
          - pipelines/09-SLDSR.qmd
          - pipelines/10-SMR.qmd
          - pipelines/11-TWAS-weights.qmd
          - pipelines/12-cTWAS.qmd
          - pipelines/13-visualization.qmd

format:
  html:
    theme: darkly
    code-fold: true   # Allows users to click to see the code
    code-summary: "Show Snakemake Code"
    toc: true
