project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "!workflow/scripts/*.Rmd"
  resources:
    - "eqtl-browser/"

website:
  title: "sc-eQTL Atlas"
  description: "A single-nucleus eQTL atlas of the developing human brain — pipeline documentation"
  repo-url: https://github.com/Dazcam/eQTL_study_2025
  repo-actions: [edit, issue]

  # ── Navbar ─────────────────────────────────────────────────────────────────
  navbar:
    pinned: true
    left:
      - text: "Overview"
        href: index.qmd
      - text: "Setup"
        href: setup.qmd
      - text: "Pipelines"
        menu:
          - text: "01 · Parse Alignment"
            href: pipelines/01-parse.qmd
          - text: "02 · Scanpy scRNA-seq"
            href: pipelines/02-scanpy.qmd
          - text: "---"
          - text: "03 · Genotype QC — Pre-imputation"
            href: pipelines/03-geno-pre.qmd
          - text: "04 · Genotype QC — Post-imputation"
            href: pipelines/04-geno-post.qmd
          - text: "---"
          - text: "05 · TensorQTL eQTL Discovery"
            href: pipelines/05-tensorqtl.qmd
          - text: "06 · eQTL Replication"
            href: pipelines/06-qtl-replication.qmd
          - text: "07 · Prepare GWAS"
            href: pipelines/07-prep-GWAS.qmd
          - text: "---"
          - text: "08 · SuSiE Fine-mapping"
            href: pipelines/08-susie.qmd
          - text: "09 · S-LDSR"
            href: pipelines/09-SLDSR.qmd
          - text: "10 · SMR"
            href: pipelines/10-SMR.qmd
          - text: "---"
          - text: "11 · TWAS Weights"
            href: pipelines/11-TWAS-weights.qmd
          - text: "12 · cTWAS"
            href: pipelines/12-cTWAS.qmd
          - text: "13 · Visualisation"
            href: pipelines/13-visualization.qmd
    right:
      - text: "<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 16 16' fill='none' style='vertical-align:-3px;margin-right:5px'><circle cx='2.5' cy='12.5' r='1.2' fill='currentColor' opacity='.45'/><circle cx='5.5' cy='9.5' r='1.2' fill='currentColor' opacity='.55'/><circle cx='7' cy='11' r='1.2' fill='currentColor' opacity='.45'/><circle cx='9.5' cy='7' r='1.2' fill='currentColor' opacity='.55'/><circle cx='11.5' cy='9' r='1.2' fill='currentColor' opacity='.45'/><circle cx='13.5' cy='5.5' r='1.2' fill='currentColor' opacity='.55'/><circle cx='8' cy='3.5' r='2' fill='currentColor'/><line x1='8' y1='5.5' x2='8' y2='13' stroke='currentColor' stroke-width='1.2' stroke-dasharray='1.5 1.2' opacity='.6'/></svg> eQTL Browser"
        href: eqtl-browser/index.html
      - icon: github
        href: https://github.com/Dazcam/eQTL_study_2025
        aria-label: GitHub

  # ── Sidebar ─────────────────────────────────────────────────────────────────
  sidebar:
    style: "floating"
    search: true
    collapse-level: 1
    contents:
      - section: "Getting Started"
        contents:
          - text: "Project Overview"
            href: index.qmd
          - text: "Setup & Configuration"
            href: setup.qmd
      - section: "Single-cell RNA-seq"
        contents:
          - pipelines/01-parse.qmd
          - pipelines/02-scanpy.qmd
      - section: "Genotyping"
        contents:
          - pipelines/03-geno-pre.qmd
          - pipelines/04-geno-post.qmd
      - section: "eQTL Mapping"
        contents:
          - pipelines/05-tensorqtl.qmd
          - pipelines/06-qtl-replication.qmd
          - pipelines/07-prep-GWAS.qmd
      - section: "Fine-mapping & Heritability"
        contents:
          - pipelines/08-susie.qmd
          - pipelines/09-SLDSR.qmd
          - pipelines/10-SMR.qmd
      - section: "TWAS"
        contents:
          - pipelines/11-TWAS-weights.qmd
          - pipelines/12-cTWAS.qmd
          - pipelines/13-visualization.qmd

  # ── Navigation & footer ──────────────────────────────────────────────────────
  page-navigation: true
  back-to-top-navigation: true

  page-footer:
    border: true
    left: |
      © 2025 Dazcam &nbsp;·&nbsp; Cardiff University, DPMCN
    center:
      - icon: file-earmark-text
        text: "Preprint"
        href: "https://github.com/Dazcam/eQTL_study_2025"
      - icon: github
        text: "GitHub"
        href: "https://github.com/Dazcam/eQTL_study_2025"
    right: |
      Built with [Quarto](https://quarto.org) &nbsp;·&nbsp; [CC BY 4.0](https://creativecommons.org/licenses/by/4.0/)

  # ── Open Graph / social cards ────────────────────────────────────────────────
  open-graph:
    title: "sc-eQTL Atlas — Developing Human Brain"
    description: "A single-nucleus eQTL atlas of the developing human brain"
    image: pipelines/images/eqtl_infographic.png
  twitter-card:
    title: "sc-eQTL Atlas — Developing Human Brain"
    description: "A single-nucleus eQTL atlas of the developing human brain"
    image: pipelines/images/eqtl_infographic.png
    card-style: summary_large_image

# ── HTML format ────────────────────────────────────────────────────────────────
format:
  html:
    theme:
      light: [flatly, custom.scss]
      dark:  [darkly,  custom.scss]
    mainfont: "Inter"
    fontsize: 1.05rem
    linestretch: 1.7
    linkcolor: "#2980b9"
    code-block-bg: true
    code-block-border-left: true
    code-overflow: scroll
    highlight-style:
      light: github
      dark:  dracula
    code-fold: true
    code-summary: "Show code"
    code-copy: true
    toc: true
    toc-depth: 3
    toc-title: "On this page"
    smooth-scroll: true
    anchor-sections: true
