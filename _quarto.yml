project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "!workflow/scripts/*.Rmd"

website:
  title: "sc-eQTL Pipeline"
  repo-url: https://github.com/Dazcam/eQTL_study_2025
  repo-actions: [edit, issue]
  navbar:
    right:
      - icon: github
        href: https://github.com/Dazcam/eQTL_study_2025
        aria-label: GitHub
  page-navigation: true
  back-to-top-navigation: true
  margin-header: |
    [![](https://img.shields.io/badge/Snakemake-v8.x-brightgreen)](https://snakemake.github.io)
    [![](https://img.shields.io/badge/Scanpy-v1.10-blue)](https://scanpy.readthedocs.io)
  sidebar:
    style: "floating"
    search: true
    contents:
      - section: "Getting Started"
        contents:
          - index.qmd
          - setup.qmd
      - section: "Pipelines"
        contents: 
          - pipelines/01-parse.qmd
          - pipelines/02-scanpy.qmd
          - pipelines/03-geno-pre.qmd
          - pipelines/04-geno-post.qmd
          - pipelines/05-tensorqtl.qmd
          - pipelines/06-qtl-replication.qmd
          - pipelines/07-prep-GWAS.qmd
          - pipelines/08-susie.qmd
          - pipelines/09-SLDSR.qmd
          - pipelines/10-SMR.qmd
          - pipelines/11-TWAS-weights.qmd
          - pipelines/12-cTWAS.qmd
          - pipelines/13-visualization.qmd

format:
  html:
    theme: 
      - darkly
      - custom.scss
    mainfont: "Inter"
    fontsize: 1.05rem
    linkcolor: "#3498db"
    code-block-bg: true
    code-block-border-left: "#2c3e50"
    highlight-style: github
    code-fold: true
    code-summary: "Show Snakemake Code"
    toc: true
